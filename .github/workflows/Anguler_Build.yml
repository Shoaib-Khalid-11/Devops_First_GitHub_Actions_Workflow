name: Build My Angular App

on:
  push:
    branches: [ main ]

jobs:
  build-anguler-app:
    runs-on: ubuntu-latest

    steps:
        - uses: actions/checkout@v6.0.2
        - name: Setup Node JS
          uses: actions/setup-node@v6.4.0
          with:
            node-version: 24.x
        - name: Install Dependencies
          run: npm run
        - name: Build Angular App
          run: npm run build
